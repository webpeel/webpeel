name: Bug Report
description: Report a bug in WebPeel
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: |
        Steps to reproduce, or a curl/CLI command that triggers the bug.
        ```bash
        webpeel "https://example.com" --json
        ```
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WebPeel version
      description: Run `webpeel --version` or check your package.json
      placeholder: "0.19.4"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where does the bug occur?
      options:
        - CLI
        - API (api.webpeel.dev)
        - MCP Server
        - npm library
        - Dashboard (app.webpeel.dev)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
