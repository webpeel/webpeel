name: CI/CD → npm publish

# This workflow handles CI (build + test) and npm publishing.
# Docker builds and K8s deployment are handled by k3s-deploy.yml (GHCR pipeline).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm (if version changed, main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          PUBLISHED=$(npm view webpeel version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "⏭️  npm version $LOCAL already published — skipping"
          else
            echo "📦 Publishing $LOCAL to npm..."
            npm publish --access public
            echo "✅ Published $LOCAL"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
