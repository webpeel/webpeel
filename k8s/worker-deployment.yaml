apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: webpeel
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/webpeel/worker:0.21.60
        imagePullPolicy: Always
        env:
        - name: NODE_ENV
          value: "production"
        - name: NODE_EXTRA_CA_CERTS
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: WORKER_MODE
          value: "1"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: JWT_SECRET
        - name: YELP_API_KEY
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: YELP_API_KEY
              optional: true
        resources:
          requests:
            memory: "128Mi"    # reduced from 256Mi to fit more worker pods
            cpu: "100m"        # reduced from 250m
          limits:
            memory: "512Mi"    # unchanged
            cpu: "500m"        # unchanged
        readinessProbe:
          exec:
            command:
            - node
            - -e
            - "const r = require('ioredis'); const c = new r(process.env.REDIS_URL || 'redis://redis:6379'); c.ping().then(() => { c.quit(); process.exit(0); }).catch(() => process.exit(1));"
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: webpeel
  labels:
    app: worker
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: metrics
  selector:
    app: worker
